# Taskr — Docker Compose example with Docker-specific fields
# Used by: Module 17 Lesson 02 (Compose translation) and Lesson 05 (Migration walkthrough)
#
# This file intentionally uses Docker-specific fields that have no Podman equivalent:
#   - build:          (build image from local Dockerfile)
#   - profiles:       (service groups)
#   - secrets:        (Docker swarm-style secrets)
#   - configs:        (Docker swarm-style configs)
#   - deploy:         (Swarm deployment config — replicas, resources, update policy)
#
# Run with: docker compose up -d
# Requires: Docker Compose v2 (docker compose), not docker-compose v1

version: "3.9"   # kept for Kompose compatibility; ignored by Compose v2

# ─────────────────────────────────────────────
# Named volumes (Docker manages paths automatically)
# Stored in: /var/lib/docker/volumes/<project>_<name>/_data
# ─────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

# ─────────────────────────────────────────────
# Docker secrets (Swarm-style; read from files in standalone mode)
# In Swarm: docker secret create postgres_password ./postgres_password.txt
# In standalone Compose: file: path is used
# ─────────────────────────────────────────────
secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  app_secret_key:
    file: ./secrets/app_secret_key.txt

# ─────────────────────────────────────────────
# Docker configs (Swarm-style; mounted as read-only files)
# ─────────────────────────────────────────────
configs:
  nginx_config:
    file: ./config/nginx.conf

# ─────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true   # no external access — backend-only

# ─────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────
services:

  # ── Web (Node.js app) ──────────────────────
  # Uses build: to build from local Dockerfile
  # This is a Docker-only feature (Kompose ignores it; must pre-build for k3s)
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
        APP_VERSION: "1.0.0"
      cache_from:
        - ghcr.io/myorg/taskr-web:cache
    image: ghcr.io/myorg/taskr-web:1.0.0   # also tag with registry image name
    container_name: taskr_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_NAME: taskr
      DATABASE_USER: taskr
      REDIS_HOST: cache
      REDIS_PORT: "6379"
      LOG_LEVEL: info
    secrets:
      - source: postgres_password
        target: /run/secrets/postgres_password   # mounted as file
      - source: redis_password
        target: /run/secrets/redis_password
      - source: app_secret_key
        target: /run/secrets/app_secret_key
    networks:
      - frontend
      - backend
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    profiles:
      - production
      - staging

  # ── PostgreSQL ─────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: taskr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskr
      POSTGRES_USER: taskr
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "taskr", "-d", "taskr"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.1"
          memory: 256M
      placement:
        constraints:
          - node.role == manager   # Swarm: keep DB on manager node

  # ── Redis ──────────────────────────────────
  cache:
    image: redis:7-alpine
    container_name: taskr_redis
    restart: unless-stopped
    command: >
      sh -c 'redis-server
        --requirepass "$$(cat /run/secrets/redis_password)"
        --appendonly yes'
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M

  # ── Nginx reverse proxy ────────────────────
  proxy:
    image: nginx:1.25-alpine
    container_name: taskr_nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    configs:
      - source: nginx_config
        target: /etc/nginx/conf.d/default.conf
    volumes:
      - nginx_logs:/var/log/nginx
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Database migration (one-shot) ─────────
  # Runs once and exits; depends_on ensures DB is ready
  migrate:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: ghcr.io/myorg/taskr-web:1.0.0
    container_name: taskr_migrate
    command: ["node", "scripts/migrate.js"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_NAME: taskr
      DATABASE_USER: taskr
    secrets:
      - postgres_password
    networks:
      - backend
    restart: "no"   # run once and exit
    profiles:
      - migration   # only runs when explicitly requested: docker compose --profile migration up

  # ── Dev tools (only in dev profile) ───────
  adminer:
    image: adminer:4
    container_name: taskr_adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"
    networks:
      - backend
    profiles:
      - dev   # docker compose --profile dev up
