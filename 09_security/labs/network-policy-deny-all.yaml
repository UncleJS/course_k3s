---
# =============================================================================
# Module 09 · Security Lab — NetworkPolicy Demo
# =============================================================================
# Demonstrates:
#   - Namespace creation
#   - A simple nginx Deployment + Service (the target)
#   - A client Deployment (busybox with curl — the tester)
#   - deny-all NetworkPolicy that blocks all traffic in the namespace
#   - allow-internal policy that lets the client reach nginx on port 80
#   - allow-dns policy that lets all pods resolve DNS
#
# IMPORTANT: NetworkPolicies are silently ignored with the default Flannel CNI.
# You must use Canal, Calico, or Cilium for policies to be enforced.
# See 02_network_policies.md for CNI swap instructions.
#
# Apply:   kubectl apply -f network-policy-deny-all.yaml
# Cleanup: kubectl delete namespace netpol-demo
#
# Testing sequence — run AFTER applying this file:
#
#   # Test 1: DNS works (allow-dns policy is active)
#   kubectl exec -n netpol-demo deploy/client -- nslookup nginx-svc
#
#   # Test 2: Client can reach nginx (allow-internal policy is active)
#   kubectl exec -n netpol-demo deploy/client -- \
#     wget -qO- --timeout=3 http://nginx-svc
#
#   # Test 3: Client CANNOT reach the internet (no egress to external IPs)
#   kubectl exec -n netpol-demo deploy/client -- \
#     wget -qO- --timeout=3 http://example.com    # should timeout
#
#   # Test 4: Verify from inside nginx pod (it cannot initiate outbound either)
#   kubectl exec -n netpol-demo deploy/nginx -- \
#     wget -qO- --timeout=3 http://example.com    # should timeout
# =============================================================================

# -----------------------------------------------------------------------------
# 1. Namespace
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: netpol-demo
  labels:
    pod-security.kubernetes.io/enforce: baseline

---
# -----------------------------------------------------------------------------
# 2. nginx Deployment — the server being protected
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: netpol-demo
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx        # NetworkPolicy targets this label
    spec:
      automountServiceAccountToken: false
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]    # needed for port 80

---
# -----------------------------------------------------------------------------
# 3. Service — exposes nginx within the namespace
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
  namespace: netpol-demo
  labels:
    app: nginx
spec:
  selector:
    app: nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

---
# -----------------------------------------------------------------------------
# 4. Client Deployment — busybox with wget/nslookup for testing
#    Label: app: client — used by the allow-internal NetworkPolicy below
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: netpol-demo
  labels:
    app: client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client       # NetworkPolicy allows traffic FROM this label
    spec:
      automountServiceAccountToken: false
      containers:
        - name: client
          image: busybox:1.36
          command: ["sleep", "3600"]    # keep running for exec-based tests
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

---
# -----------------------------------------------------------------------------
# 5. NetworkPolicy — deny-all
#    Blocks ALL ingress and ALL egress for every pod in the namespace.
#    This is the security baseline. Apply this FIRST, then add specific
#    allow rules below.
#
#    The empty podSelector ({}) matches every pod in the namespace.
#    Listing both Ingress and Egress in policyTypes with no rules = deny both.
#
#    After applying this policy:
#    - nginx cannot receive requests from anywhere (not even from client)
#    - client cannot send requests anywhere (not even DNS)
#    - No pod can reach the internet
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: netpol-demo
spec:
  podSelector: {}        # matches ALL pods in the namespace
  policyTypes:
    - Ingress
    - Egress
  # No ingress rules = deny all ingress
  # No egress rules  = deny all egress

---
# -----------------------------------------------------------------------------
# 6. NetworkPolicy — allow-internal
#    Allows pods labelled 'app: client' to reach pods labelled 'app: nginx'
#    on TCP port 80.
#
#    This models the typical "frontend can reach backend" pattern.
#    Nothing else can reach nginx — not the internet, not other pods.
#
#    Note: This policy applies TO nginx (podSelector: app: nginx) and
#    specifies that ingress FROM client (app: client) on port 80 is allowed.
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal
  namespace: netpol-demo
spec:
  # This policy applies to nginx pods
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Only allow traffic from pods with label app: client in this namespace
        - podSelector:
            matchLabels:
              app: client
      ports:
        - protocol: TCP
          port: 80

---
# -----------------------------------------------------------------------------
# 7. NetworkPolicy — allow-dns
#    Without this policy, ALL pods have their DNS egress blocked by deny-all.
#    Pod name resolution (e.g., "nginx-svc" → ClusterIP) will fail silently,
#    causing confusing connection timeouts that look like network issues.
#
#    This policy allows all pods in the namespace to reach kube-dns
#    (CoreDNS) on UDP/TCP port 53.
#
#    The kube-system namespace must have the label:
#    kubernetes.io/metadata.name=kube-system (applied automatically in k8s 1.21+)
#
#    Verify: kubectl get namespace kube-system --show-labels
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: netpol-demo
spec:
  podSelector: {}        # applies to ALL pods in the namespace
  policyTypes:
    - Egress
  egress:
    - to:
        # AND condition: pod must be in kube-system namespace AND have kube-dns label
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        # DNS over UDP (standard)
        - protocol: UDP
          port: 53
        # DNS over TCP (for large responses, zone transfers)
        - protocol: TCP
          port: 53
