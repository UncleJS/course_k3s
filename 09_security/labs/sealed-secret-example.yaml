---
# =============================================================================
# Module 09 · Security Lab — Sealed Secrets Example
# =============================================================================
# Sealed Secrets allow you to safely commit encrypted Secret manifests to Git.
# A SealedSecret can only be decrypted by the sealed-secrets-controller
# running in your cluster — not by anyone else, even if they have the YAML.
#
# WORKFLOW OVERVIEW:
# ─────────────────
#  Developer workstation                 Git repo              Kubernetes
#  ──────────────────────               ──────────────────    ──────────────────
#  1. Create plain Secret (in memory)
#  2. Pipe through kubeseal CLI ──────→  SealedSecret YAML ─→  kubectl apply
#  (NEVER write plain Secret to disk)                           │
#                                                               ↓
#                                                    sealed-secrets-controller
#                                                    decrypts → creates Secret
#
# PREREQUISITES:
# ──────────────
# 1. Install the sealed-secrets controller in your cluster:
#
#    helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
#    helm repo update
#    helm install sealed-secrets sealed-secrets/sealed-secrets \
#      --namespace kube-system \
#      --set fullnameOverride=sealed-secrets-controller
#
# 2. Install the kubeseal CLI on your workstation:
#
#    # Linux (amd64)
#    KUBESEAL_VERSION=$(curl -s https://api.github.com/repos/bitnami-labs/sealed-secrets/releases/latest | jq -r .tag_name)
#    curl -Lo kubeseal.tar.gz \
#      "https://github.com/bitnami-labs/sealed-secrets/releases/download/${KUBESEAL_VERSION}/kubeseal-${KUBESEAL_VERSION#v}-linux-amd64.tar.gz"
#    tar xzf kubeseal.tar.gz
#    sudo install -m 755 kubeseal /usr/local/bin/kubeseal
#    rm kubeseal.tar.gz
#
#    # macOS (Homebrew)
#    brew install kubeseal
#
#    # Verify
#    kubeseal --version
#
# =============================================================================

# =============================================================================
# SECTION A: Namespace
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: sealed-demo

---
# =============================================================================
# SECTION B: Plain Secret — FOR REFERENCE ONLY
# =============================================================================
# ⚠ WARNING: NEVER commit this section to Git.
# This plain Secret is shown here ONLY to illustrate what the SealedSecret
# below represents. In a real workflow, you would never write this to a file —
# you would pipe it directly through kubeseal without saving it.
#
# To create and seal in a single pipeline (RECOMMENDED approach):
#
#   kubectl create secret generic app-credentials \
#     --namespace sealed-demo \
#     --from-literal=api-key='my-super-secret-api-key' \
#     --from-literal=db-password='correct-horse-battery-staple' \
#     --dry-run=client -o yaml \
#   | kubeseal \
#       --controller-namespace kube-system \
#       --controller-name sealed-secrets-controller \
#       --format yaml \
#   > sealed-app-credentials.yaml
#
# The --dry-run=client flag ensures the plain Secret is NEVER sent to the API
# server or written to disk. Only the SealedSecret YAML touches the filesystem.
#
# If you accidentally commit a plain Secret:
#   1. Rotate the credential immediately (assume it is compromised)
#   2. Remove the file and use `git filter-repo` to purge it from history
#   3. Force-push (coordinate with your team)
# =============================================================================
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: app-credentials
#   namespace: sealed-demo
# type: Opaque
# stringData:
#   api-key: my-super-secret-api-key          # ← NEVER commit this
#   db-password: correct-horse-battery-staple # ← NEVER commit this
#
# =============================================================================

# =============================================================================
# SECTION C: SealedSecret — SAFE TO COMMIT TO GIT
# =============================================================================
# The encrypted values below were generated with kubeseal using the cluster's
# public key. They are ciphertext — they reveal nothing about the plaintext.
#
# The sealed-secrets-controller will automatically:
#   1. Detect this SealedSecret being applied
#   2. Decrypt it using the cluster's private key (stored in kube-system)
#   3. Create a regular Secret named 'app-credentials' in 'sealed-demo'
#
# IMPORTANT SCOPING:
#   By default, a SealedSecret is cluster+namespace scoped: the ciphertext
#   can only be decrypted in the exact namespace and cluster it was sealed for.
#   This prevents copying a sealed secret from one namespace to another.
#
#   Scope options (set via kubeseal --scope flag):
#     strict          (default) — must match both cluster and namespace
#     namespace-wide  — any namespace in the same cluster
#     cluster-wide    — any namespace in any cluster (use with caution)
#
# TO GENERATE REAL VALUES FOR YOUR CLUSTER:
#   kubectl create secret generic app-credentials \
#     --namespace sealed-demo \
#     --from-literal=api-key='YOUR_ACTUAL_SECRET' \
#     --from-literal=db-password='YOUR_ACTUAL_PASSWORD' \
#     --dry-run=client -o yaml \
#   | kubeseal \
#       --controller-namespace kube-system \
#       --controller-name sealed-secrets-controller \
#       --format yaml
#
# Replace the encryptedData values below with the output from that command.
# =============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: app-credentials
  namespace: sealed-demo
  annotations:
    # sealedsecrets.bitnami.com/namespace-wide: "true"   # uncomment for namespace-wide scope
    # sealedsecrets.bitnami.com/cluster-wide: "true"     # uncomment for cluster-wide scope
spec:
  # encryptedData contains each key from the original Secret, encrypted individually.
  # Each value is an asymmetrically-encrypted string — base64(RSA-OAEP(plaintext)).
  # These are PLACEHOLDER values — they will NOT decrypt in your cluster.
  # Replace them with values produced by kubeseal against your cluster's public key.
  encryptedData:
    # Placeholder — replace with: kubeseal output for 'api-key'
    # Format: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEq...  (long base64 string)
    api-key: AgBYPLACEHOLDER_REPLACE_WITH_KUBESEAL_OUTPUT_api_key_

    # Placeholder — replace with: kubeseal output for 'db-password'
    db-password: AgBYPLACEHOLDER_REPLACE_WITH_KUBESEAL_OUTPUT_db_password_

  # template defines the resulting Secret's metadata and type
  template:
    metadata:
      name: app-credentials
      namespace: sealed-demo
      labels:
        app.kubernetes.io/part-of: sealed-demo
      annotations:
        # Optional: add annotations to the generated Secret
        created-by: sealed-secrets-workflow
    type: Opaque

---
# =============================================================================
# SECTION D: Example Pod consuming the (generated) Secret
# =============================================================================
# Once the SealedSecret is applied, the controller creates a regular Secret.
# This pod shows how to consume it — identical to any other Secret usage.
# =============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: secret-consumer
  namespace: sealed-demo
  labels:
    app: secret-consumer
spec:
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "API key length: $(cat /etc/app-secrets/api-key | wc -c) chars"
          echo "DB password length: $(cat /etc/app-secrets/db-password | wc -c) chars"
          echo "Secrets loaded successfully."
          sleep 3600
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
      volumeMounts:
        - name: app-credentials
          mountPath: /etc/app-secrets
          readOnly: true
  volumes:
    - name: app-credentials
      secret:
        secretName: app-credentials   # created by sealed-secrets-controller
        defaultMode: 0400             # owner read-only

# =============================================================================
# SECTION E: Key Management Notes
# =============================================================================
# The sealed-secrets-controller manages an RSA key pair in kube-system:
#   - Public key:  used by kubeseal to encrypt secrets (safe to distribute)
#   - Private key: stays in the cluster, used to decrypt SealedSecrets
#
# BACKUP THE PRIVATE KEY (critical for disaster recovery):
#
#   kubectl get secret -n kube-system \
#     -l sealedsecrets.bitnami.com/sealed-secrets-key \
#     -o yaml > sealed-secrets-master-key-BACKUP.yaml
#
#   # Store this backup encrypted and off-cluster (e.g., in a password manager,
#   # KMS-encrypted S3 bucket, or HashiCorp Vault).
#   # Without this key, you CANNOT decrypt existing SealedSecrets after a
#   # cluster rebuild.
#
# FETCH THE PUBLIC KEY (for CI/CD pipelines that seal secrets):
#
#   kubeseal --fetch-cert \
#     --controller-namespace kube-system \
#     --controller-name sealed-secrets-controller \
#   > sealed-secrets-public-key.pem
#
#   # Store this public key in your CI/CD system.
#   # CI can use it to seal secrets WITHOUT cluster access:
#
#   kubectl create secret generic my-secret \
#     --from-literal=token=abc123 \
#     --dry-run=client -o yaml \
#   | kubeseal --cert sealed-secrets-public-key.pem --format yaml \
#   > sealed-my-secret.yaml
#
# KEY ROTATION:
#   The controller automatically generates a new key every 30 days (configurable).
#   Old keys are kept to decrypt existing SealedSecrets.
#   Re-seal all secrets with the new key to allow removing old keys:
#
#   # List all keys
#   kubectl get secrets -n kube-system \
#     -l sealedsecrets.bitnami.com/sealed-secrets-key \
#     -o wide
# =============================================================================
